<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340" fill="none" role="img" aria-label="Joe — I automate the boring parts of marketing and sales">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#D97757"/>
      <stop offset="1" stop-color="#F0A989"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.15" r="0.8">
      <stop offset="0" stop-color="#D97757" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#D97757" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- backdrop -->
  <rect width="1200" height="340" rx="14" fill="url(#bg)"/>
  <rect width="1200" height="340" rx="14" fill="url(#glow)"/>
  <rect x="0.5" y="0.5" width="1199" height="339" rx="14" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- workflow graph (right) -->
  <g stroke="#D97757" stroke-opacity="0.35" stroke-width="1.5">
    <line x1="800" y1="100" x2="920" y2="170"/>
    <line x1="920" y1="170" x2="1040" y2="92"/>
    <line x1="1040" y1="92" x2="1150" y2="168"/>
    <line x1="920" y1="170" x2="1010" y2="262"/>
    <line x1="1010" y1="262" x2="868" y2="268"/>
    <line x1="868" y1="268" x2="800" y2="100"/>
  </g>

  <g fill="#0d1117" stroke="url(#orange)" stroke-width="2">
    <circle cx="800" cy="100" r="9">
      <animate attributeName="r" values="9;12;9" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="920" cy="170" r="11">
      <animate attributeName="r" values="11;14;11" dur="3.6s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1040" cy="92" r="9">
      <animate attributeName="r" values="9;12;9" dur="2.8s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1150" cy="168" r="8">
      <animate attributeName="r" values="8;11;8" dur="3.4s" begin="1.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1010" cy="262" r="9">
      <animate attributeName="r" values="9;12;9" dur="3s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="868" cy="268" r="8">
      <animate attributeName="r" values="8;11;8" dur="3.8s" begin="1.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- travelling pulse along the graph -->
  <circle r="4.5" fill="#F0A989" filter="url(#soft)">
    <animateMotion dur="4s" repeatCount="indefinite"
      path="M800,100 L920,170 L1040,92 L1150,168"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle r="4" fill="#F0A989" filter="url(#soft)">
    <animateMotion dur="3.5s" begin="1.2s" repeatCount="indefinite"
      path="M920,170 L1010,262 L868,268 L800,100"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="3.5s" begin="1.2s" repeatCount="indefinite"/>
  </circle>

  <!-- text block (left) -->
  <text x="70" y="92" font-family="Consolas, 'SF Mono', Menlo, monospace" font-size="15" letter-spacing="2" fill="#7d8590">~/joe — automation engineer</text>
  <rect x="312" y="80" width="9" height="16" fill="#D97757">
    <animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <text x="68" y="168" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="46" font-weight="700" fill="#e6edf3">I automate the boring</text>
  <text x="68" y="224" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="46" font-weight="700" fill="#e6edf3">parts of <tspan fill="url(#orange)">marketing &amp; sales</tspan>.</text>

  <rect x="70" y="252" width="0" height="3" rx="1.5" fill="url(#orange)">
    <animate attributeName="width" values="0;240" dur="1.4s" begin="0.3s" fill="freeze"/>
  </rect>

  <text x="70" y="292" font-family="Consolas, 'SF Mono', Menlo, monospace" font-size="15" letter-spacing="1" fill="#7d8590">GoHighLevel<tspan fill="#444c56">  ·  </tspan>Prospecting systems<tspan fill="#444c56">  ·  </tspan>AI tooling</text>
</svg>
