<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" fill="none" role="img" aria-label="Joe, I automate the boring parts of marketing and sales">
  <!-- canvas -->
  <rect x="0.5" y="0.5" width="1199" height="299" rx="16" fill="#fbfaf8"/>
  <rect x="0.5" y="0.5" width="1199" height="299" rx="16" fill="none" stroke="#eceae6" stroke-width="1"/>

  <!-- accent tick -->
  <rect x="70" y="70" width="22" height="4" rx="2" fill="#C2410C"/>

  <g font-family="'Segoe UI', Helvetica, Arial, sans-serif" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.7s" fill="freeze"/>

    <text x="104" y="78" font-size="14" font-weight="600" letter-spacing="2.5" fill="#8a8f98">JOE  /  MARKETING &amp; SALES AUTOMATION</text>

    <text x="68" y="158" font-size="52" font-weight="700" letter-spacing="-1" fill="#1f2328">I automate the boring parts</text>
    <text x="68" y="222" font-size="52" font-weight="700" letter-spacing="-1" fill="#1f2328">of <tspan fill="#C2410C">marketing &amp; sales</tspan>.</text>

    <text x="70" y="270" font-size="16" fill="#6e7681">GoHighLevel, prospecting systems, AI tooling</text>
  </g>

  <!-- key-phrase underline draws in -->
  <rect x="123" y="232" width="0" height="5" rx="2.5" fill="#C2410C" opacity="0.9">
    <animate attributeName="width" values="0;418" dur="0.9s" begin="0.6s" fill="freeze"/>
  </rect>
</svg>
