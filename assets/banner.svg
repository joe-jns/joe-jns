<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" fill="none" role="img" aria-label="Terminal: joe — marketing and sales automation builder">
  <!-- window -->
  <rect x="1" y="1" width="1198" height="358" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <!-- title bar -->
  <path d="M1 13 a12 12 0 0 1 12 -12 h1174 a12 12 0 0 1 12 12 v33 h-1198 z" fill="#161b22"/>
  <line x1="1" y1="46" x2="1199" y2="46" stroke="#30363d" stroke-width="1"/>
  <circle cx="28" cy="23" r="6" fill="#ec6a5e"/>
  <circle cx="50" cy="23" r="6" fill="#f4bf4f"/>
  <circle cx="72" cy="23" r="6" fill="#61c554"/>
  <text x="600" y="28" text-anchor="middle" font-family="Consolas, 'SF Mono', Menlo, monospace" font-size="14" fill="#6e7681">joe@automation — zsh</text>

  <!-- body -->
  <g font-family="Consolas, 'SF Mono', Menlo, monospace" font-size="17">

    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.25s" begin="0.2s" fill="freeze"/>
      <text x="34" y="98"><tspan fill="#D97757">joe@automation</tspan><tspan fill="#6e7681">:~$</tspan><tspan fill="#e6edf3"> whoami</tspan></text>
      <text x="34" y="128" fill="#adbac7">Joe — I automate the boring parts of marketing &amp; sales.</text>
    </g>

    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.25s" begin="0.9s" fill="freeze"/>
      <text x="34" y="172"><tspan fill="#D97757">joe@automation</tspan><tspan fill="#6e7681">:~$</tspan><tspan fill="#e6edf3"> ls focus/</tspan></text>
      <text x="34" y="202"><tspan fill="#6cb6ff">gohighlevel</tspan><tspan fill="#444c56">     </tspan><tspan fill="#6cb6ff">prospecting</tspan><tspan fill="#444c56">     </tspan><tspan fill="#6cb6ff">ai-tooling</tspan></text>
    </g>

    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.25s" begin="1.6s" fill="freeze"/>
      <text x="34" y="246"><tspan fill="#D97757">joe@automation</tspan><tspan fill="#6e7681">:~$</tspan><tspan fill="#e6edf3"> cat stack.txt</tspan></text>
      <text x="34" y="276" fill="#adbac7">javascript<tspan fill="#444c56">  ·  </tspan>node<tspan fill="#444c56">  ·  </tspan>shell<tspan fill="#444c56">  ·  </tspan>playwright<tspan fill="#444c56">  ·  </tspan>claude</text>
    </g>

    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.25s" begin="2.3s" fill="freeze"/>
      <text x="34" y="320"><tspan fill="#D97757">joe@automation</tspan><tspan fill="#6e7681">:~$</tspan></text>
      <rect x="226" y="306" width="10" height="18" fill="#adbac7">
        <animate attributeName="opacity" values="1;1;0;0" dur="1.1s" begin="2.6s" repeatCount="indefinite"/>
      </rect>
    </g>

  </g>
</svg>
